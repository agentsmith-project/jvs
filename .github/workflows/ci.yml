name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      tag:
        description: Existing v* tag to release
        required: true
        type: string

jobs:
  build:
    name: Build and Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && format('refs/tags/{0}', github.event.inputs.tag) || github.ref }}
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Download dependencies
        run: go mod download

      - name: Build
        run: make build

      - name: Run unit tests
        run: make test

      - name: Run CI workflow contract
        run: make ci-contract

      - name: Run conformance tests
        run: make conformance

  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && format('refs/tags/{0}', github.event.inputs.tag) || github.ref }}

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Install golangci-lint
        run: make tools

      - name: golangci-lint
        run: make lint

  security:
    name: Security Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && format('refs/tags/{0}', github.event.inputs.tag) || github.ref }}

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Run security scans
        run: make security

      - name: Upload gosec results
        uses: actions/upload-artifact@v4
        with:
          name: gosec-report
          path: gosec-report.json

  release-toolchain-smoke:
    name: Release Toolchain Smoke
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && format('refs/tags/{0}', github.event.inputs.tag) || github.ref }}

      - name: Install cosign
        uses: sigstore/cosign-installer@v4.1.1
        with:
          cosign-release: v3.0.5

      - name: Verify cosign version
        env:
          COSIGN_EXPECTED_VERSION: v3.0.5
        run: |
          set -eu
          version_output="$(cosign version 2>&1)"
          printf '%s\n' "$version_output"
          case "$version_output" in
            *"${COSIGN_EXPECTED_VERSION}"*|*"${COSIGN_EXPECTED_VERSION#v}"*) ;;
            *)
              echo "expected cosign ${COSIGN_EXPECTED_VERSION}" >&2
              exit 1
              ;;
          esac

  dco-check:
    name: DCO Check
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check DCO sign-offs
        run: |
          FAILED=false
          # Get the merge base to find commits in this PR
          MERGE_BASE=$(git merge-base origin/main HEAD)
          # Check each commit since merge base
          for commit in $(git rev-list $MERGE_BASE..HEAD); do
            if ! git log -1 --format='%B' "$commit" | grep -q "^Signed-off-by:"; then
              echo "❌ Commit $commit is missing DCO Signed-off-by line"
              git log -1 --format='Commit %h by %an: %s' "$commit"
              FAILED=true
            fi
          done
          if [ "$FAILED" = "true" ]; then
            echo ""
            echo "DCO check failed. All commits must be signed off."
            echo "Please amend your commits with 'git commit --amend --signoff'"
            echo "or configure git to automatically sign off: git config --local commit.signoff true"
            exit 1
          fi
          echo "✓ All commits have proper DCO sign-offs"

  release-gate:
    name: Release Gate
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'

    steps:
      - name: Validate manual release tag
        if: github.event_name == 'workflow_dispatch'
        env:
          GITHUB_TOKEN: ${{ github.token }}
          RELEASE_REPOSITORY: ${{ github.repository }}
          RELEASE_SERVER_URL: ${{ github.server_url }}
          RELEASE_TAG: ${{ github.event.inputs.tag }}
        run: |
          case "$RELEASE_TAG" in
            v*) ;;
            *) echo "workflow_dispatch release tag must start with v" && exit 1 ;;
          esac
          git check-ref-format "refs/tags/$RELEASE_TAG"
          git -c "http.${RELEASE_SERVER_URL}/.extraheader=AUTHORIZATION: bearer ${GITHUB_TOKEN}" \
            ls-remote --exit-code --refs "${RELEASE_SERVER_URL}/${RELEASE_REPOSITORY}.git" "refs/tags/$RELEASE_TAG" >/dev/null

      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && format('refs/tags/{0}', github.event.inputs.tag) || github.ref }}
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Download dependencies
        run: go mod download

      - name: Install golangci-lint
        run: make tools

      - name: Run release gate
        run: make release-gate

  release:
    name: Release
    needs: [build, lint, security, release-toolchain-smoke, release-gate]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
    permissions:
      contents: write
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && format('refs/tags/{0}', github.event.inputs.tag) || github.ref }}

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Install cosign
        uses: sigstore/cosign-installer@v4.1.1
        with:
          cosign-release: v3.0.5

      - name: Build binaries
        run: make release-build

      - name: Generate release notes
        run: |
          set -eu
          RELEASE_TAG="${GITHUB_REF_NAME}"
          if [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ]; then
            RELEASE_TAG="${{ github.event.inputs.tag }}"
          fi
          CERTIFICATE_IDENTITY="https://github.com/${GITHUB_REPOSITORY}/.github/workflows/ci.yml@${GITHUB_REF}"
          RELEASE_COMMIT="$(git rev-parse HEAD)"
          {
            echo "## Build Artifacts"
            echo ""
            echo "### Binaries"
            echo "- 5 binaries:"
            echo "  - jvs-linux-amd64 - Linux x86_64"
            echo "  - jvs-linux-arm64 - Linux ARM64"
            echo "  - jvs-darwin-amd64 - macOS x86_64"
            echo "  - jvs-darwin-arm64 - macOS ARM64 (Apple Silicon)"
            echo "  - jvs-windows-amd64.exe - Windows x86_64"
            echo '- matching `.bundle` files for each binary'
            echo '- `SHA256SUMS` - SHA-256 hashes for the published binaries'
            echo '- `SHA256SUMS.bundle` - cosign v3 bundle for `SHA256SUMS`'
            echo ""
            echo "### Verification"
            echo "All binaries and SHA256SUMS are signed using Sigstore/cosign v3 bundle files. Download each artifact with its matching .bundle; see docs/SIGNING.md for the full guide."
            echo ""
            echo "    cosign verify-blob jvs-linux-amd64 \\"
            echo "      --bundle jvs-linux-amd64.bundle \\"
            echo "      --certificate-identity=${CERTIFICATE_IDENTITY} \\"
            echo "      --certificate-oidc-issuer=https://token.actions.githubusercontent.com"
            echo ""
            echo "    cosign verify-blob SHA256SUMS \\"
            echo "      --bundle SHA256SUMS.bundle \\"
            echo "      --certificate-identity=${CERTIFICATE_IDENTITY} \\"
            echo "      --certificate-oidc-issuer=https://token.actions.githubusercontent.com"
            echo ""
            echo "After verifying SHA256SUMS, run sha256sum -c --ignore-missing SHA256SUMS."
            echo "- For tag-push releases, the signing certificate identity is the tag ref, for example refs/tags/${RELEASE_TAG}."
            echo "- For manual workflow_dispatch releases, artifacts are checked out from refs/tags/${RELEASE_TAG} and published as ${RELEASE_TAG}, but the signing certificate identity remains the workflow ref (${GITHUB_REF}) that launched the run."
            echo ""
            echo "## Canonical final evidence"
            echo "- source archive: the GitHub source archive is a tag snapshot for ${RELEASE_TAG}; it records source readiness at tag time."
            echo "- publication final evidence: this GitHub Release page and the post-release main ledger on main record workflow run, release state, assets, checksums, signing identity, smoke, and coverage."
            echo "- Release URL: ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/releases/tag/${RELEASE_TAG}"
            echo "- Tag: ${RELEASE_TAG}"
            echo "- Workflow run: ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
            echo "- Commit: ${RELEASE_COMMIT}"
            echo "- Asset count: 12"
            echo "- Release state: draft=false, prerelease=false"
            echo "- Signing identity: ${CERTIFICATE_IDENTITY}"
            echo "- Tag movement: tag was not moved; post-publication facts live in the GitHub Release page and post-release main ledger."
            echo ""
            echo "## Breaking changes"
            echo "- None for the stable v0 public CLI contract."
            echo ""
            echo "## Known limitations"
            echo "- v0 does not include remote push/pull, in-JVS signing commands, public partial-save contracts, compression contracts, merge/rebase, or complex retention policy flags."
            echo "- Full verification reads save point payloads and can be I/O intensive on large workspaces."
            echo "- Descriptor signing and in-JVS trust policy remain outside the stable v0 repository format."
            echo ""
            echo "## Risk labels"
            echo "- integrity: descriptor checksum and payload hash detect independent corruption; coordinated descriptor-plus-checksum rewrite remains a v0 residual risk."
            echo "- migration: runtime operation state must be rebuilt at the destination with jvs doctor --strict --repair-runtime; exclude active .jvs/locks/**, .jvs/intents/**, and .jvs/gc/*.json during physical backup or storage sync."
            echo ""
            echo "## Migration notes"
            echo "- Existing repositories do not need an on-disk migration for this release."
            echo "- After upgrading, run jvs doctor --strict on a representative repo."
            echo "- After physical backup or storage migration, exclude active .jvs/locks/**, .jvs/intents/**, and .jvs/gc/*.json, then run jvs doctor --strict --repair-runtime at the destination before verification."
          } > release-notes.md

      - name: Sign binaries with cosign
        run: |
          set -eu
          cd bin
          for binary in \
            jvs-linux-amd64 \
            jvs-linux-arm64 \
            jvs-darwin-amd64 \
            jvs-darwin-arm64 \
            jvs-windows-amd64.exe
          do
            cosign sign-blob --yes --bundle="${binary}.bundle" "${binary}"
          done

      - name: Create checksums
        run: |
          cd bin
          sha256sum \
            jvs-linux-amd64 \
            jvs-linux-arm64 \
            jvs-darwin-amd64 \
            jvs-darwin-arm64 \
            jvs-windows-amd64.exe > SHA256SUMS
          cd ..

      - name: Sign checksums file
        run: |
          set -eu
          cd bin
          cosign sign-blob --yes --bundle="SHA256SUMS.bundle" "SHA256SUMS"

      - name: Verify release artifacts
        run: |
          set -eu
          cd bin
          CERTIFICATE_IDENTITY="https://github.com/${GITHUB_REPOSITORY}/.github/workflows/ci.yml@${GITHUB_REF}"
          for artifact in \
            jvs-linux-amd64 \
            jvs-linux-amd64.bundle \
            jvs-linux-arm64 \
            jvs-linux-arm64.bundle \
            jvs-darwin-amd64 \
            jvs-darwin-amd64.bundle \
            jvs-darwin-arm64 \
            jvs-darwin-arm64.bundle \
            jvs-windows-amd64.exe \
            jvs-windows-amd64.exe.bundle \
            SHA256SUMS \
            SHA256SUMS.bundle
          do
            test -s "$artifact"
          done
          sha256sum --check --strict SHA256SUMS
          for payload in \
            jvs-linux-amd64 \
            jvs-linux-arm64 \
            jvs-darwin-amd64 \
            jvs-darwin-arm64 \
            jvs-windows-amd64.exe \
            SHA256SUMS
          do
            cosign verify-blob "$payload" \
              --bundle "${payload}.bundle" \
              --certificate-identity="$CERTIFICATE_IDENTITY" \
              --certificate-oidc-issuer=https://token.actions.githubusercontent.com
          done

      - name: Upload artifacts to release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            bin/jvs-linux-amd64
            bin/jvs-linux-amd64.bundle
            bin/jvs-linux-arm64
            bin/jvs-linux-arm64.bundle
            bin/jvs-darwin-amd64
            bin/jvs-darwin-amd64.bundle
            bin/jvs-darwin-arm64
            bin/jvs-darwin-arm64.bundle
            bin/jvs-windows-amd64.exe
            bin/jvs-windows-amd64.exe.bundle
            bin/SHA256SUMS
            bin/SHA256SUMS.bundle
          body_path: release-notes.md
          tag_name: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag || github.ref_name }}
          draft: false
          prerelease: false
