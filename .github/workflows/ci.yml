name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      tag:
        description: Existing v* tag to release
        required: true
        type: string

jobs:
  build:
    name: Build and Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && format('refs/tags/{0}', github.event.inputs.tag) || github.ref }}

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Download dependencies
        run: go mod download

      - name: Build
        run: make build

      - name: Run unit tests
        run: make test

      - name: Run CI workflow contract
        run: make ci-contract

      - name: Run conformance tests
        run: make conformance

  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && format('refs/tags/{0}', github.event.inputs.tag) || github.ref }}

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Install golangci-lint
        run: |
          go install github.com/golangci/golangci-lint/cmd/golangci-lint@latest
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: golangci-lint
        run: make lint

  security:
    name: Security Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && format('refs/tags/{0}', github.event.inputs.tag) || github.ref }}

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Install gosec
        run: go install github.com/securego/gosec/v2/cmd/gosec@latest

      - name: Run gosec
        run: |
          gosec -verbose=text -fmt=json -out gosec-report.json ./... || true

      - name: Upload gosec results
        uses: actions/upload-artifact@v4
        with:
          name: gosec-report
          path: gosec-report.json

      - name: Install staticcheck
        run: go install honnef.co/go/tools/cmd/staticcheck@latest

      - name: Run staticcheck
        run: staticcheck ./... || true

  dco-check:
    name: DCO Check
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check DCO sign-offs
        run: |
          FAILED=false
          # Get the merge base to find commits in this PR
          MERGE_BASE=$(git merge-base origin/main HEAD)
          # Check each commit since merge base
          for commit in $(git rev-list $MERGE_BASE..HEAD); do
            if ! git log -1 --format='%B' "$commit" | grep -q "^Signed-off-by:"; then
              echo "❌ Commit $commit is missing DCO Signed-off-by line"
              git log -1 --format='Commit %h by %an: %s' "$commit"
              FAILED=true
            fi
          done
          if [ "$FAILED" = "true" ]; then
            echo ""
            echo "DCO check failed. All commits must be signed off."
            echo "Please amend your commits with 'git commit --amend --signoff'"
            echo "or configure git to automatically sign off: git config --local commit.signoff true"
            exit 1
          fi
          echo "✓ All commits have proper DCO sign-offs"

  release-gate:
    name: Release Gate
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'

    steps:
      - name: Validate manual release tag
        if: github.event_name == 'workflow_dispatch'
        env:
          GITHUB_TOKEN: ${{ github.token }}
          RELEASE_REPOSITORY: ${{ github.repository }}
          RELEASE_SERVER_URL: ${{ github.server_url }}
          RELEASE_TAG: ${{ github.event.inputs.tag }}
        run: |
          case "$RELEASE_TAG" in
            v*) ;;
            *) echo "workflow_dispatch release tag must start with v" && exit 1 ;;
          esac
          git check-ref-format "refs/tags/$RELEASE_TAG"
          git -c "http.${RELEASE_SERVER_URL}/.extraheader=AUTHORIZATION: bearer ${GITHUB_TOKEN}" \
            ls-remote --exit-code --refs "${RELEASE_SERVER_URL}/${RELEASE_REPOSITORY}.git" "refs/tags/$RELEASE_TAG" >/dev/null

      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && format('refs/tags/{0}', github.event.inputs.tag) || github.ref }}

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Download dependencies
        run: go mod download

      - name: Install golangci-lint
        run: |
          go install github.com/golangci/golangci-lint/cmd/golangci-lint@latest
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: Run release gate
        run: make release-gate

  release:
    name: Release
    needs: [build, lint, security, release-gate]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
    permissions:
      contents: write
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && format('refs/tags/{0}', github.event.inputs.tag) || github.ref }}

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Build binaries
        run: |
          GOOS=linux GOARCH=amd64 go build -o bin/jvs-linux-amd64 ./cmd/jvs
          GOOS=linux GOARCH=arm64 go build -o bin/jvs-linux-arm64 ./cmd/jvs
          GOOS=darwin GOARCH=amd64 go build -o bin/jvs-darwin-amd64 ./cmd/jvs
          GOOS=darwin GOARCH=arm64 go build -o bin/jvs-darwin-arm64 ./cmd/jvs
          GOOS=windows GOARCH=amd64 go build -o bin/jvs-windows-amd64.exe ./cmd/jvs

      - name: Generate build artifacts summary
        run: |
          echo "## Build Artifacts" > release-notes.md
          echo "" >> release-notes.md
          echo "### Binaries" >> release-notes.md
          echo "- \`jvs-linux-amd64\` - Linux x86_64" >> release-notes.md
          echo "- \`jvs-linux-arm64\` - Linux ARM64" >> release-notes.md
          echo "- \`jvs-darwin-amd64\` - macOS x86_64" >> release-notes.md
          echo "- \`jvs-darwin-arm64\` - macOS ARM64 (Apple Silicon)" >> release-notes.md
          echo "- \`jvs-windows-amd64.exe\` - Windows x86_64" >> release-notes.md
          echo "" >> release-notes.md
          echo "### Verification" >> release-notes.md
          echo "All binaries are signed using Sigstore/cosign. To verify:" >> release-notes.md
          echo "\`\`\`bash" >> release-notes.md
          echo "cosign verify-blob jvs-linux-amd64 \\ " >> release-notes.md
          echo "  --certificate-identity=https://github.com/jvs-project/jvs/.github/workflows/ci.yml@${GITHUB_REF} \\ " >> release-notes.md
          echo "  --certificate-oidc-issuer=https://token.actions.githubusercontent.com" >> release-notes.md
          echo "\`\`\`" >> release-notes.md

      - name: Sign binaries with cosign
        run: |
          for binary in bin/jvs-*; do
            cosign sign-blob --yes --output-signature="${binary}.sig" --output-certificate="${binary}.pem" "${binary}"
          done

      - name: Create checksums
        run: |
          cd bin
          sha256sum jvs-* > SHA256SUMS
          cd ..

      - name: Sign checksums file
        run: |
          cosign sign-blob --yes --output-signature="bin/SHA256SUMS.sig" --output-certificate="bin/SHA256SUMS.pem" "bin/SHA256SUMS"

      - name: Upload artifacts to release
        uses: softprops/action-gh-release@v2
        with:
          files: bin/*
          body_path: release-notes.md
          tag_name: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag || github.ref_name }}
          draft: false
          prerelease: false
